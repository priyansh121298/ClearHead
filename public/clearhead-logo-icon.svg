<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B6EF6"/>
      <stop offset="100%" stop-color="#2DD4BF"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#A89EF8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7B6EF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Brain outline -->
  <path d="M100 24
           C68 24 44 48 44 78
           C44 96 52 108 58 118
           C62 124 62 130 62 138
           L138 138
           C138 130 138 124 142 118
           C148 108 156 96 156 78
           C156 48 132 24 100 24Z"
        fill="none" stroke="url(#brainStroke)" stroke-width="6" stroke-linejoin="round"/>

  <!-- Left hemisphere fold lines (organic/chaotic side) -->
  <path d="M70 60 Q60 74 70 84 Q56 88 64 104"
        fill="none" stroke="#7B6EF6" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <path d="M84 48 Q78 56 82 64"
        fill="none" stroke="#7B6EF6" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Right hemisphere fold lines (organized side) -->
  <path d="M132 60 Q140 74 130 84 Q142 88 136 104"
        fill="none" stroke="#2DD4BF" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <path d="M116 48 Q122 56 118 64"
        fill="none" stroke="#2DD4BF" stroke-width="3.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Synapse lines radiating from center -->
  <g stroke-width="3.5" stroke-linecap="round">
    <line x1="100" y1="86" x2="72" y2="62" stroke="#7B6EF6" opacity="0.8"/>
    <line x1="100" y1="86" x2="128" y2="62" stroke="#2DD4BF" opacity="0.8"/>
    <line x1="100" y1="86" x2="66" y2="98" stroke="#7B6EF6" opacity="0.7"/>
    <line x1="100" y1="86" x2="134" y2="98" stroke="#2DD4BF" opacity="0.7"/>
    <line x1="100" y1="86" x2="100" y2="54" stroke="#A89EF8" opacity="0.6"/>
  </g>

  <!-- Outer synapse nodes -->
  <circle cx="72" cy="62" r="5" fill="#7B6EF6"/>
  <circle cx="128" cy="62" r="5" fill="#2DD4BF"/>
  <circle cx="66" cy="98" r="4.5" fill="#7B6EF6"/>
  <circle cx="134" cy="98" r="4.5" fill="#2DD4BF"/>
  <circle cx="100" cy="54" r="4" fill="#A89EF8"/>

  <!-- Central glowing core -->
  <circle cx="100" cy="86" r="20" fill="url(#coreGlow)"/>
  <circle cx="100" cy="86" r="9" fill="url(#brainStroke)"/>
</svg>
